name: Run Selenium Tests

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4   # ✅ updated

      - name: Setup Java
        uses: actions/setup-java@v4   # ✅ updated
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v2   # ✅ updated

      - name: Compile Code
        run: javac -cp "libs/*" src/miniproject/TestScripts.java

      - name: Run Tests
        run: java -cp ".:libs/*:src" miniproject.TestScripts